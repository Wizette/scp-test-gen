<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCP Test – Sign In</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Verdana, Arial, Helvetica, sans-serif;
  font-size: 14px;
  color: rgb(69, 79, 89);
  background: rgb(245, 245, 245);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border: 1px solid rgb(217, 218, 218);
  border-radius: 4px;
  padding: 32px 28px;
  width: 90%;
  max-width: 420px;
}
h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
.subtitle { text-align: center; color: rgb(140, 140, 140); font-size: 13px; margin-bottom: 24px; }
.tabs {
  display: flex;
  border-bottom: 2px solid rgb(230, 230, 230);
  margin-bottom: 20px;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px 0;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  color: rgb(140, 140, 140);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s, border-color 0.15s;
}
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
.tab:hover:not(.active) { color: rgb(69, 79, 89); }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgb(100, 100, 100);
  margin-bottom: 4px;
}
.form-group input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid rgb(217, 218, 218);
  border-radius: 4px;
  font-family: inherit;
  font-size: 14px;
  color: rgb(69, 79, 89);
  transition: border-color 0.15s;
}
.form-group input:focus { outline: none; border-color: #3b82f6; }
.btn {
  display: block;
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 4px;
  font-family: inherit;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #2563eb; }
.msg {
  text-align: center;
  font-size: 13px;
  margin-top: 14px;
  padding: 10px;
  border-radius: 4px;
  display: none;
}
.msg.error { display: block; background: #fee2e2; color: #dc2626; }
.msg.success { display: block; background: #dcfce7; color: #16a34a; }
.admin-link {
  text-align: center;
  margin-top: 18px;
  font-size: 12px;
}
.admin-link a { color: rgb(180, 180, 180); text-decoration: none; }
.admin-link a:hover { color: rgb(140, 140, 140); text-decoration: underline; }
.pane { display: none; }
.pane.active { display: block; }
</style>
</head>
<body>

<div class="card">
  <h1>SCP Test</h1>
  <p class="subtitle">Sign in to access tests</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Request Access</div>
  </div>

  <!-- Sign In -->
  <div class="pane active" id="pane-login">
    <form onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" type="submit" id="login-btn">Sign In</button>
    </form>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Request Access -->
  <div class="pane" id="pane-signup">
    <form onsubmit="return handleSignup(event)">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="signup-name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signup-user" autocomplete="username" required pattern="[a-zA-Z0-9_]{3,30}" title="3-30 characters: letters, numbers, underscore">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-pass" autocomplete="new-password" required minlength="4">
      </div>
      <button class="btn btn-primary" type="submit" id="signup-btn">Request Access</button>
    </form>
    <div class="msg" id="signup-msg"></div>
  </div>

  <div class="admin-link"><a href="admin.html">Admin</a></div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1));
  });
  document.getElementById('pane-login').classList.toggle('active', tab === 'login');
  document.getElementById('pane-signup').classList.toggle('active', tab === 'signup');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('login-user').value.trim(),
        password: document.getElementById('login-pass').value
      })
    });
    const data = await resp.json();

    if (resp.ok) {
      showMsg('login-msg', 'Welcome, ' + data.displayName + '! Redirecting…', 'success');
      setTimeout(() => { location.href = 'index.html' + location.search; }, 600);
    } else {
      showMsg('login-msg', data.error || 'Login failed.', 'error');
    }
  } catch (err) {
    showMsg('login-msg', 'Network error. Is the server running?', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
  return false;
}

async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const resp = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        displayName: document.getElementById('signup-name').value.trim(),
        username: document.getElementById('signup-user').value.trim(),
        password: document.getElementById('signup-pass').value
      })
    });
    const data = await resp.json();

    if (resp.ok) {
      showMsg('signup-msg', data.message, 'success');
    } else {
      showMsg('signup-msg', data.error || 'Signup failed.', 'error');
    }
  } catch (err) {
    showMsg('signup-msg', 'Network error. Is the server running?', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Request Access';
  return false;
}

// If already authenticated, redirect to test
(async function checkAuth() {
  try {
    const resp = await fetch('/api/verify');
    if (resp.ok) location.href = 'index.html' + location.search;
  } catch {}
})();
</script>
</body>
</html>
